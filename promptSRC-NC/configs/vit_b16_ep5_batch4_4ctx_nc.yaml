OPTIM:
  NAME: "sgd"
  LR: 0.00025
  MAX_EPOCH: 5
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 0

MODEL:
  BACKBONE:
    NAME: "ViT-B/16"
    OPENCLIP_NAME: "ViT-B-16"
    PRETRAINED: "openai"

TRAINER:
  NAME: "PromptSRC_NC"
  PROMPTSRC:
    N_CTX_VISION: 4
    N_CTX_TEXT: 4
    CTX_INIT: "a photo of a"
    PREC: "amp"
    PROMPT_DEPTH_VISION: 9
    PROMPT_DEPTH_TEXT: 9
    TEXT_LOSS_WEIGHT: 25
    IMAGE_LOSS_WEIGHT: 10
    GPA_MEAN: 45
    GPA_STD: 5
  PROMPTSRC_NC:
    NEIGHBOR_K: 1
    FALLBACK_K: 5
    MIN_PAIRS_FRACTION: 0.25
    LAMBDA_NC_MAX: 1.0
    LAMBDA_NC_WARMUP_EPOCHS: 1
    STAGE2_EPOCHS: 5
    STAGE2_LR: 0.00025
    PAIR_BATCH_SIZE: 8
    PAIR_MODE: "real"
    UNLABELED_SPLIT: "train_remain"
    USE_TEST_IMAGES: false
    USE_STAGE2_GPA: false

